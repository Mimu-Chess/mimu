name: Desktop Linux CI

on:
  push:
    paths-ignore:
      - '.github/workflows/**'
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build On Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Neutralino runtime binaries
        run: bunx neu update

      - name: Build workspace
        run: bun run desktop:build

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-build
          path: dist/mimu-chess
          if-no-files-found: error
          retention-days: 7
